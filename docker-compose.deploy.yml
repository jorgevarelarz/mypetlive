services:
  mongo:
    image: mongo:6
    container_name: mypetlive_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks: [mypetlive]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mypetlive_api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: development
      # Señal explícita de producción: NODE_ENV se queda en development por los mocks,
      # pero los bypasses de verificación (ALLOW_UNVERIFIED, /dev/verify) miran APP_ENV.
      APP_ENV: production
      PORT: "3000"
      MONGO_URI: "mongodb://mongo:27017/mypetlive"
      JWT_SECRET: "${JWT_SECRET}"
      CORS_ORIGIN: "${CORS_ORIGIN}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY}"
      VAPID_SUBJECT: "${VAPID_SUBJECT}"
      ESCROW_DRIVER: mock
      SIGN_PROVIDER: mock
      SMS_PROVIDER: mock
      # Email transaccional vía Postfix de Plesk (recuperación de contraseña, etc.)
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
      SMTP_SECURE: "${SMTP_SECURE}"
      SMTP_TLS_REJECT_UNAUTHORIZED: "${SMTP_TLS_REJECT_UNAUTHORIZED}"
      FRONTEND_URL: "${FRONTEND_URL}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      DONATION_FEE_PERCENT: "${DONATION_FEE_PERCENT}"
      PATITA_VALUE_EUR: "${PATITA_VALUE_EUR}"
      VISIT_PATITAS_REWARD: "${VISIT_PATITAS_REWARD}"
      COUPON_PATITAS_REWARD_DEFAULT: "${COUPON_PATITAS_REWARD_DEFAULT}"
    # Las fotos subidas (uploads) viven en el host: sin este volumen se pierden
    # cada vez que se recrea el contenedor.
    volumes:
      - ./uploads:/app/uploads
    # Mapea el hostname del cert de mail al host para que el contenedor alcance
    # el Postfix de Plesk a través del gateway de la red Docker.
    extra_hosts:
      - "panel.valerisstudio.es:host-gateway"
    ports:
      - "3000:3000"
    networks: [mypetlive]

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        REACT_APP_API_URL: "${REACT_APP_API_URL}"
    container_name: mypetlive_web
    restart: unless-stopped
    ports:
      - "8080:80"
    networks: [mypetlive]

networks:
  mypetlive:

volumes:
  mongo_data:
